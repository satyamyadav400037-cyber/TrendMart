<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrendMart Login</title>
    <link rel="stylesheet" href="styles02.css">
</head>
<body>

<div class="page">
    <div class="box">
        <h2>Trend<span>Mart</span></h2>

        <form onsubmit="handleLogin(event)">

            <label>Email</label>
            <input 
                id="email"
                type="email" 
                placeholder="Enter Your Email"
                required>

            <label>Password</label>
            <input 
                id="password"
                type="password" 
                placeholder="Enter Your Password"
                required>

            <button type="submit">Log In</button>

        </form>
        <h4>sign up for an account? <a href="#">Sign Up</a></h4>
    </div>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();
        // Redirect to the main page simulating a login
        window.location.href = "TrendMart.html";
    }
</script>

</body>
</html>
